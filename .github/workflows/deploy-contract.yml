name: Deploy Anchor Contract to Devnet

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: week6/bryan-frontend

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI (stable = newest platform-tools with Rust 1.85+)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Set up deploy wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          solana config set --keypair ~/.config/solana/id.json
          echo "Deployer: $(solana address)"
          solana balance

      - name: Restore program keypair
        run: |
          mkdir -p contract/target/deploy
          echo '${{ secrets.PROGRAM_KEYPAIR }}' > contract/target/deploy/token_distribution-keypair.json

      - name: Build program with cargo build-sbf (skips idl-build to avoid edition2024 deps)
        # anchor build enables idl-build feature which pulls in toml_datetime 1.1.1
        # (requires edition2024, incompatible with platform-tools Rust 1.84).
        # cargo build-sbf compiles the program directly without IDL generation.
        # The IDL is already committed to the frontend at src/idl/token_distribution.json.
        working-directory: contract/programs/token_distribution
        run: |
          cargo build-sbf 2>&1
          ls ../../target/deploy/
          echo "Build complete."

      - name: Deploy to devnet
        working-directory: contract
        run: |
          solana program deploy \
            target/deploy/token_distribution.so \
            --keypair ~/.config/solana/id.json \
            --program-id target/deploy/token_distribution-keypair.json \
            --url devnet \
            2>&1 | tee deploy.log
          PROGRAM_ID=$(cat deploy.log | grep -E "Program Id:|program_id" | head -1 | awk '{print $NF}')
          if [ -z "$PROGRAM_ID" ]; then
            # Fallback: read from keypair file
            PROGRAM_ID=$(solana-keygen pubkey target/deploy/token_distribution-keypair.json)
          fi
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "Deployed: $PROGRAM_ID"

      - name: Summary
        run: |
          echo "## ✅ VEZTRA Contract Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Program ID:** \`${{ env.PROGRAM_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Explorer:** https://explorer.solana.com/address/${{ env.PROGRAM_ID }}?cluster=devnet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend Program ID:** \`GarNqFaBLcyhb3knGu7s9qkESPJvVD7wHKDakWbCWiVC\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If deployed ID differs from frontend, update \`NEXT_PUBLIC_PROGRAM_ID\` in Vercel." >> $GITHUB_STEP_SUMMARY
