name: Deploy Anchor Contract to Devnet

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: week6/bryan-frontend

      - name: Pin Rust to 1.87 (must be installed before Solana/AVM)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.2.1/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via AVM
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.32.0
          avm use 0.32.0
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Pre-generate Cargo.lock with Rust 1.87 to pin transitive deps
        # Platform-tools cargo (1.84) cannot parse toml_datetime>=1.1.1 (needs edition2024).
        # Generate the lock file first with system cargo so it resolves an older dep tree.
        working-directory: contract
        env:
          RUSTUP_TOOLCHAIN: "1.87"
        run: |
          echo "Using cargo: $(which cargo) -- $(cargo --version)"
          cargo +1.87 generate-lockfile
          echo "Cargo.lock generated. Checking for toml_datetime:"
          grep "toml_datetime" Cargo.lock | head -5

      - name: Set up deploy wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          solana config set --keypair ~/.config/solana/id.json
          echo "Deployer: $(solana address)"
          solana balance

      - name: Restore program keypair
        run: |
          mkdir -p contract/target/deploy
          echo '${{ secrets.PROGRAM_KEYPAIR }}' > contract/target/deploy/token_distribution-keypair.json

      - name: Build Anchor program
        working-directory: contract
        run: |
          echo "anchor version: $(anchor --version)"
          anchor build

      - name: Deploy to devnet
        working-directory: contract
        run: |
          anchor deploy --provider.cluster devnet 2>&1 | tee deploy.log
          PROGRAM_ID=$(cat deploy.log | grep "Program Id:" | awk '{print $NF}')
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "Deployed: $PROGRAM_ID"

      - name: Summary
        run: |
          echo "## ✅ VEZTRA Contract Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Program ID:** \`${{ env.PROGRAM_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Explorer:** https://explorer.solana.com/address/${{ env.PROGRAM_ID }}?cluster=devnet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Update \`NEXT_PUBLIC_PROGRAM_ID\` in Vercel dashboard to \`${{ env.PROGRAM_ID }}\`" >> $GITHUB_STEP_SUMMARY
